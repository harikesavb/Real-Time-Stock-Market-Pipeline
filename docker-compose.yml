services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: stock_pipeline_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: unless-stopped
    networks:
      - stock_pipeline_net

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: stock_pipeline_kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b localhost:9092 1 20"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - stock_pipeline_net

  postgres:
    image: postgres:15
    container_name: stock_pipeline_postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      KESTRA_POSTGRES_SCHEMA: ${KESTRA_POSTGRES_SCHEMA}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped
    networks:
      - stock_pipeline_net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: stock_pipeline_pgadmin
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@stockpipeline.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    restart: unless-stopped
    networks:
      - stock_pipeline_net

  producer:
    image: stock_pipeline-producer:latest
    build:
      context: ./producer
    container_name: stock_pipeline_producer
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      FETCH_INTERVAL_SECONDS: 10
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - stock_pipeline_net

  consumer:
    image: stock_pipeline-consumer:latest
    build:
      context: ./consumer
    container_name: stock_pipeline_consumer
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      CONSUMER_GROUP_ID: stock-price-postgres-writer
      CONSUMER_HEALTH_PORT: 8081
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8081/health').read()\""
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - stock_pipeline_net

  dbt:
    image: stock_pipeline-dbt:latest
    build:
      context: .
      dockerfile: dbt_project/Dockerfile
    container_name: stock_pipeline_dbt
    env_file:
      - .env
    environment:
      DBT_HOST: postgres
      DBT_PORT: 5432
      DBT_PROFILES_DIR: /app/dbt_project
    command: ["sleep", "infinity"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - stock_pipeline_net

  kestra:
    image: kestra/kestra:latest
    container_name: stock_pipeline_kestra
    user: root
    env_file:
      - .env
    environment:
      ENV_POSTGRES_USER: ${POSTGRES_USER}
      ENV_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      ENV_POSTGRES_DB: ${POSTGRES_DB}
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://postgres:5432/${POSTGRES_DB}?currentSchema=${KESTRA_POSTGRES_SCHEMA}
            driver-class-name: org.postgresql.Driver
            username: ${POSTGRES_USER}
            password: ${POSTGRES_PASSWORD}
        kestra:
          server:
            basic-auth:
              username: "${KESTRA_ADMIN_USERNAME}"
              password: "${KESTRA_ADMIN_PASSWORD}"
          repository:
            type: postgres
          queue:
            type: postgres
          storage:
            type: local
            local:
              base-path: /app/storage
          tasks:
            tmp-dir:
              path: /tmp/kestra-wd/tmp
          url: http://localhost:8080/
          anonymous-usage-report:
            enabled: false
          ui-anonymous-usage-report:
            enabled: false
          tutorialFlows:
            enabled: false
    entrypoint: ["/bin/sh", "/app/scripts/kestra-entrypoint.sh"]
    depends_on:
      postgres:
        condition: service_healthy
      dbt:
        condition: service_started
    ports:
      - "8080:8080"
    volumes:
      - kestra_storage:/app/storage
      - kestra_tmp:/tmp
      - ./kestra/flows:/app/flows
      - ./kestra/entrypoint.sh:/app/scripts/kestra-entrypoint.sh
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    networks:
      - stock_pipeline_net

  grafana:
    image: grafana/grafana:latest
    container_name: stock_pipeline_grafana
    env_file:
      - .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/provisioning/dashboards/stock_dashboard.json:/var/lib/grafana/dashboards/stock_dashboard.json
    restart: unless-stopped
    networks:
      - stock_pipeline_net

networks:
  stock_pipeline_net:
    name: stock_pipeline_net

volumes:
  postgres_data:
  pgadmin_data:
  kestra_storage:
  kestra_tmp:
  grafana_data:
