version: 2

sources:
  - name: stocks
    schema: public
    tables:
      - name: raw_stock_prices
        description: Raw stock price events ingested from Kafka into PostgreSQL.

models:
  - name: stg_stock_prices
    description: Cleaned stock price events prepared for downstream analytics.
    columns:
      - name: id
        description: Identity column generated by PostgreSQL.
        tests:
          - unique
      - name: symbol
        description: Stock ticker symbol.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["AAPL", "GOOGL", "MSFT", "AMZN", "TSLA"]
      - name: price
        description: Latest traded price captured from Yahoo Finance.
        tests:
          - not_null
          - positive_value
      - name: volume
        description: Reported trading volume at the captured event time.
        tests:
          - positive_value
      - name: event_timestamp
        description: UTC timestamp assigned to the market event.
        tests:
          - not_null
